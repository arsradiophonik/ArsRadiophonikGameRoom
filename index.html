// ── GRID ──────────────────────────────────────────────────────────────────────
const COLS=80,ROWS=25;
const termEl=document.getElementById('terminal');
const rowEls=[];
for(let r=0;r<ROWS;r++){const d=document.createElement('div');d.className='row';termEl.appendChild(d);rowEls.push(d);}
const grid=Array.from({length:ROWS},()=>Array.from({length:COLS},()=>({ch:' ',cls:'gr'})));
let cursorR=24,cursorC=3;
function setCell(r,c,ch,cls='gr'){if(r<0||r>=ROWS||c<0||c>=COLS)return;grid[r][c]={ch,cls};}
function clearRow(r){for(let c=0;c<COLS;c++)grid[r][c]={ch:' ',cls:'gr'};}
function clearScreen(){for(let r=0;r<ROWS;r++)clearRow(r);}
function writeStr(r,c,str,cls='gr'){for(let i=0;i<str.length;i++)setCell(r,c+i,str[i],cls);}
function renderRow(r){
  const cells=grid[r];let html='';
  for(let c=0;c<COLS;c++){
    if(r===cursorR&&c===cursorC){html+='<span class="cursor"></span>';continue;}
    const{ch,cls}=cells[c];
    const safe=ch==='<'?'&lt;':ch==='>'?'&gt;':ch==='&'?'&amp;':ch;
    html+=cls==='gr'?safe:`<span class="${cls}">${safe}</span>`;
  }
  rowEls[r].innerHTML=html;
}
function renderAll(){for(let r=0;r<ROWS;r++)renderRow(r);}
function drawBox(r1,r2,c1,c2,cls='dim'){
  for(let c=c1;c<=c2;c++){setCell(r1,c,'─',cls);setCell(r2,c,'─',cls);}
  for(let r=r1+1;r<r2;r++){setCell(r,c1,'│',cls);setCell(r,c2,'│',cls);}
  setCell(r1,c1,'┌',cls);setCell(r1,c2,'┐',cls);setCell(r2,c1,'└',cls);setCell(r2,c2,'┘',cls);
}

const LOG_TOP=4,LOG_LINES=16;
let logBuf=[];
function pushLog(text,cls='gr'){logBuf.push({text:String(text).slice(0,COLS),cls});if(logBuf.length>200)logBuf.shift();renderLogArea();}
function renderLogArea(){
  const vis=logBuf.slice(-LOG_LINES);
  for(let i=0;i<LOG_LINES;i++){
    clearRow(LOG_TOP+i);
    if(i<vis.length)writeStr(LOG_TOP+i,0,vis[i].text.padEnd(COLS),vis[i].cls);

let twQ=[],twRun=false;
function tlog(text,cls='gr',instant=false){twQ.push({text:String(text),cls,instant});if(!twRun)nextTW();}
function nextTW(){
  if(!twQ.length){twRun=false;return;}
  twRun=true;
  const{text,cls,instant}=twQ.shift();
  if(instant||text.length<3){pushLog(text,cls);renderAll();setTimeout(nextTW,20);return;}
  let i=0;const spd=text.length>60?6:text.length>30?10:14;
  function tick(){
    const partial=text.slice(0,++i);
    const visLen=Math.min(logBuf.length,LOG_LINES-1);
    const row=LOG_TOP+visLen;
    clearRow(row);writeStr(row,0,partial,cls);renderRow(row);
    if(i<text.length)setTimeout(tick,spd);
    else{pushLog(text,cls);renderAll();setTimeout(nextTW,40);}
  }
  tick();
}

// ── GAME LOGIC ────────────────────────────────────────────────────────────────
function expForLevel(l){return Math.floor(100*Math.pow(1.18,l-1));}
function hpForLevel(l){return 80+l*20;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function randFrom(a){return a[Math.floor(Math.random()*a.length)];}

function scheduleEvent(){if(!gameOn)return;const p=PHASES[G.phaseIndex];evT=setTimeout(triggerRandom,(p.agg?12000:20000)+Math.random()*18000);}
function triggerRandom(){if(!gameOn||G.inCombat)return scheduleEvent();Math.random()<0.6?triggerEncounter():triggerNeg();}

function makeCreature(boss,res,satan){
  const name=CREATURE_NAMES[Math.floor(Math.random()*CREATURE_NAMES.length)];
  let type,subtype;
  if(satan){type="SATAN";subtype="SPECIAL";}
  else if(res){type="RESOURCE";subtype="SPECIAL";}
  else if(boss){type="CORE";subtype=randFrom(["SPECIAL","ACTOR"]);}
  else{type=randFrom(["DATO","RED HEX","PURPOSE","DATO","RED HEX"]);subtype=randFrom(SUBTYPES.filter(s=>s!=="SPECIAL"));}
  const lvl=satan?666:res?333:boss?G.level+rand(10,20):Math.max(1,G.level+rand(-5,8));
  const hpMax=hpForLevel(lvl)+(res?5000:0)+(satan?9999:0);
  return{name,type,subtype,level:lvl,hp:hpMax,hpMax,ether:Math.floor(lvl*1.5)};
}

function psychFlavor(e){
  if(!G.psych)return null;
  const p=G.psych;
  const uname=G.username.toUpperCase();
  const flees=p.flees||0,attacks=p.attacks||0,total=Math.max(1,flees+attacks+(p.ignores||0));
  // Attr-based insult (highest priority if profile built)
  if(p.attrs&&Object.keys(p.attrs).length>=2&&Math.random()<0.5){
    const ins=getAttrInsult(p);
    if(ins)return (Math.random()<0.35?uname+'. ':'')+ins;
  }
  // Behavioral insults
  const candidates=[];
  if(flees/total>0.4)candidates.push(...PSYCH_INSULTS.fleeing);
  if(attacks/total>0.6)candidates.push(...PSYCH_INSULTS.aggressive);
  if(!(p.recruits>0))candidates.push(...PSYCH_INSULTS.loner);
  if((p.etherSpent||0)>50)candidates.push(...PSYCH_INSULTS.negotiator);
  if((p.abandoned||[]).length>0)candidates.push(...PSYCH_INSULTS.abandoned);
  if((p.saveCount||0)>12)candidates.push(...PSYCH_INSULTS.saver);
  // Shared memory
  if(Math.random()<0.15){const sm=randFrom(SHARED_MEMORY);return sm[0]+'  "'+sm[1]+'"';}
  // Named entity questions with player name
  if(Math.random()<0.25){
    const q=randFrom(ENTITY_QUESTIONS);
    return (Math.random()<0.4?uname+', ':'')+q;
  }
  if(candidates.length>0){
    const ins=randFrom(candidates);
    return (Math.random()<0.3?uname+'. ':'')+ins;
  }
  return null;
}

function triggerEncounter(){
  const e=makeCreature();G.currentEnemy=e;G.inCombat=false;
  const agg=PHASES[G.phaseIndex].agg;
  tlog('ENCOUNTER -- '+e.name+' ['+e.type+'/'+e.subtype+'] Lv.'+e.level,'red');
  tlog(randFrom(TAUNTS[e.type]||TAUNTS["RED HEX"]),'dim');
  // Spontaneous psychological flavor 45% of the time
  if(Math.random()<0.45){const fl=psychFlavor(e);if(fl)setTimeout(()=>tlog(e.name+': "'+fl+'"','red'),800);}
  // ORATOR spontaneous prophecy 20%
  if(e.subtype==='ORATOR'&&Math.random()<0.20)setTimeout(()=>spontaneousProphecy(e),1200);
  setEvent('ENCOUNTER :: '+e.name,'['+e.type+']['+e.subtype+'] Lv.'+e.level+' HP:'+e.hp+' ETH:'+e.ether+(agg?' [!]FULL MOON':''),agg?'attack  companion':'attack  talk  recruit  offer  flee  companion');
}

function triggerNeg(){
  const e=makeCreature();G.currentEnemy=e;G.inCombat=false;
  // Memory callback
  const mem=entityRemembrance(e);
  if(mem){tlog(e.name+': "'+mem+'"','pur');}
  else{tlog('CONTACT -- '+e.name+' ['+e.type+'] approaches without hostility.','cyn');}
  tlog(randFrom(TALK[e.type]||TALK["RED HEX"]),'dim');
  const oraHint=e.subtype==='ORATOR'?'  oracle':'';
  setEvent('CONTACT :: '+e.name,'['+e.type+']['+e.subtype+'] Lv.'+e.level+' -- wants to communicate.','listen  recruit  attack  ignore'+oraHint);
}

function entityRemembrance(e){
  if(!G.psych)return null;
  const p=G.psych;
  const uname=G.username.toUpperCase();
  const lines=[];
  if(p.memoryLog&&p.memoryLog.length>1)lines.push(uname+'. You still have not answered what I asked before.');
  if(p.abandoned&&p.abandoned.length>0)lines.push('You left '+p.abandoned[0]+' behind, '+uname+'. It is still registered in the net.');
  if(p.lastProphecy&&p.oracleVisits>0)lines.push('The reading you received... you think about it more than you admit.');
  if(p.sessionsPlayed>2)lines.push('You have returned here '+p.sessionsPlayed+' times. The void remembers every arrival, '+uname+'.');
  if(p.attrs&&Object.keys(p.attrs).length>2){const ins=getAttrInsult(p);if(ins)lines.push(ins);}
  return lines.length&&Math.random()<0.45?randFrom(lines):null;
}

function triggerAmbush(e){G.inCombat=true;tlog('[!] AMBUSH -- '+e.name+' attacks!','red');setEvent('[!] AMBUSH :: '+e.name,'['+e.type+'] Lv.'+e.level+' -- surprise attack.','attack  offer  flee  companion');}
function triggerSatan(){

function scheduleBoss(){bosT=setTimeout(triggerBoss,300000+Math.random()*300000);}
function triggerBoss(){
  if(!gameOn)return;if(G.inCombat){bosT=setTimeout(triggerBoss,60000);return;}

function scheduleResource(){setTimeout(triggerResource,900000+Math.random()*900000);}
function triggerResource(){
  if(!gameOn)return;const r=makeCreature(false,true);G.currentEnemy=r;
  tlog('[!!!] ANOMALY DETECTED [!!!]','yel');tlog('RESOURCE -- '+r.name+' -- Level 333. Virtual reality tears.','wh');
  setEvent('[!!!] RESOURCE :: '+r.name,'[RESOURCE] Lv.333 HP:'+r.hp+'  Consuming eliminates hunger forever.','attack  offer  companion  flee');
}
function startHunger(){
  hunT=setInterval(()=>{
    if(!gameOn||!G)return;
    G.companions.forEach(c=>{
      if(c.immortalHunger)return;
      c.hunger=Math.max(0,c.hunger-rand(3,7));
      if(c.hunger<=0){if(Math.random()<0.6){tlog(c.name+' abandons you. Hunger consumed it.','yel');G.companions=G.companions.filter(x=>x!==c);}else tlog(c.name+' is at the edge. Feed it.','yel');}
      else if(c.hunger<=15)tlog(c.name+' is starving.','yel');
      if(c.sleeping&&Math.random()<0.3){c.sleeping=false;c.hp=Math.floor(c.hpMax*0.5);tlog(c.name+' awakens from hibernation.','cyn');}
    });
    if(!phT)phT=setTimeout(advPhase,60000);
    renderStatusBar();autoSave();
  },30000);
}
function advPhase(){
  G.phaseIndex=(G.phaseIndex+1)%PHASES.length;updatePhase();
  const p=PHASES[G.phaseIndex];
  tlog('LUNAR PHASE: '+p.sym+' '+p.name+' -- '+p.effect,'yel');
  if(p.agg)tlog('Entities will not negotiate until the moon changes.','red');
  phT=setTimeout(advPhase,60000);autoSave();
}
function gainExp(a){
  G.exp+=a;
  while(G.exp>=G.expNext){G.exp-=G.expNext;G.level++;G.expNext=expForLevel(G.level);G.hpMax=hpForLevel(G.level);G.hp=G.hpMax;tlog('レベルアップ -- LEVEL '+G.level+' reached. HP restored to '+G.hpMax+'.','wh');G.companions.forEach(c=>{if(Math.random()<0.4){c.level++;c.hpMax=hpForLevel(c.level);c.hp=c.hpMax;}});}
  renderStatusBar();
}
function startHeal(){if(healT)clearInterval(healT);healT=setInterval(()=>{if(!gameOn||!G||G.inCombat||G.hp>=G.hpMax)return;const r=Math.max(1,Math.floor(G.hpMax*0.03));G.hp=Math.min(G.hpMax,G.hp+r);renderStatusBar();autoSave();},15000);}
function playerDeath(msg){
  gameOn=false;clearTimeout(evT);clearInterval(hunT);clearTimeout(bosT);clearInterval(healT);
  tlog('消滅 -- '+msg,'red');
  try{localStorage.removeItem('hdr_'+G.username);}catch(e){}
  setTimeout(()=>showDeadScreen(msg),2000);
}
function defeatEnemy(e){
  G.ether+=e.ether;
  const xp=Math.floor(e.level*15*(e.type==='CORE'?3:e.type==='RESOURCE'?10:e.type==='SATAN'?20:1));
  gainExp(xp);tlog(e.name+' defeated. +'+e.ether+' Ether  +'+xp+' EXP.','wh');
  if(e.type==='RESOURCE'||e.type==='SATAN'){G.companions.forEach(c=>c.immortalHunger=true);tlog('Your companions will never hunger again.','grn');}
  clearEvent();G.currentEnemy=null;G.inCombat=false;renderStatusBar();autoSave();scheduleEvent();
}

// ── COMMANDS ──────────────────────────────────────────────────────────────────
function handleGameCmd(raw){
  if(!G||!gameOn)return;
  tlog('>> '+raw,'dim',true);
  if(raw==='ave sathanas'){triggerSatan();return;}
  switch(raw){
    case 'help':HELP_L.forEach(l=>tlog(l||' ','dim',true));break;
    case 'status':case 'st':
      tlog('ENTITY: Lv.'+G.level+' HP:'+G.hp+'/'+G.hpMax+' EXP:'+G.exp+'/'+G.expNext+' Ether:'+G.ether,'gr');
      tlog(G.inCombat?'[IN COMBAT -- no regen]':'[regen +'+Math.max(1,Math.floor(G.hpMax*0.03))+'/15s]','dim');break;
    case 'companions':case 'co':
      if(!G.companions.length){tlog('No companions.','dim');break;}
      G.companions.forEach(c=>tlog('  '+c.name+' ['+c.type+'/'+c.subtype+'] Lv.'+c.level+' HP:'+c.hp+'/'+c.hpMax+' Hunger:'+c.hunger+'%'+(c.sleeping?' [HBN]':''),typeColor(c.type)));break;
    case 'phase':{const p=PHASES[G.phaseIndex];tlog(p.sym+' '+p.name+' -- '+p.effect,'gr');break;}
    case 'save':autoSave();tlog('Game saved. ゲームを保存しました。','grn');break;
    case 'export':cmdExport();break;
    case 'scan':case 'enemy':cmdScan();break;
    case 'lore':tlog('lore dato / lore redhex / lore purpose / lore core / lore resource','dim');break;
    case 'lore dato':showLore('dato');break;
    case 'lore redhex':showLore('redhex');break;
    case 'lore purpose':showLore('proposito');break;
    case 'lore core':showLore('nucleo');break;
    case 'lore resource':showLore('recurso');break;
    case 'feed':cmdFeed();break;
    case 'abandon':cmdAbandon();break;
    case 'attack':case 'atk':cmdAttack();break;
    case 'talk':case 'listen':cmdTalk();break;
    case 'recruit':cmdRecruit();break;
    case 'offer':cmdOffer();break;
    case 'flee':case 'run':cmdFlee();break;
    case 'companion':case 'send':cmdCompanion();break;
    case 'ignore':cmdIgnore();break;
    case 'profile':cmdProfile();break;
    case 'oracle':case 'read':
      if(G.currentEnemy&&G.currentEnemy.subtype==='ORATOR'){cmdOracle(G.currentEnemy);}
      else{tlog('No ORATOR entity present. Approach one first.','dim');}break;
    case 'yes':case 'si':case 'y':cmdPsychAnswer(true);break;
    case 'no':case 'n':cmdPsychAnswer(false);break;
    default:tlog('Unknown command: "'+raw+'". Type "help".','dim');
  }
  renderStatusBar();
}

function cmdProfile(){
  if(!G.psych||!G.psych.attrs||Object.keys(G.psych.attrs).length===0){
    tlog('No profile data yet. Speak to the entities.','dim');return;
  }
  const p=G.psych;
  const top=Object.entries(p.attrs||{}).sort((a,b)=>b[1]-a[1]).slice(0,5);
  tlog('PSYCHOLOGICAL PROFILE :: '+G.username.toUpperCase(),'pur',true);
  tlog('─'.repeat(40),'dim',true);
  top.forEach(([attr,val])=>tlog('  '+attr.padEnd(22)+' '+('█'.repeat(Math.min(val,8))),'red',true));
  if(p.zodiac&&ZODIAC[p.zodiac]){const z=ZODIAC[p.zodiac];tlog('  ELEMENT: '+z.el+'  SIGN: '+z.sym,'pur',true);}
  tlog('  SESSIONS: '+p.sessionsPlayed+'  FLEES: '+p.flees+'  ATTACKS: '+p.attacks,'dim',true);
  if(top.length>0&&ATTR_INSULTS[top[0][0]]){
    setTimeout(()=>tlog('"'+randFrom(ATTR_INSULTS[top[0][0]])+'"','red'),800);
  }
}
function cmdExport(){

function cmdScan(){
  if(!G.currentEnemy){tlog('No enemy present.','dim');return;}
  const e=G.currentEnemy;const pct=Math.round(e.hp/e.hpMax*100);const hcls=pct<25?'red':pct<50?'yel':'gr';
  tlog('SCAN :: '+e.name,'wh',true);tlog('  TYPE:  '+e.type+' / '+e.subtype,typeColor(e.type),true);
  tlog('  LEVEL: '+e.level,'gr',true);tlog('  HP:    '+e.hp+'/'+e.hpMax+' ('+pct+'%)',hcls,true);
  tlog('  ETHER: '+e.ether,'pur',true);
  tlog('  STR:   '+((TSTR[e.type]||[]).join(', ')||'none'),'dim',true);
  tlog('  WEAK:  '+((TWKN[e.type]||[]).join(', ')||'none'),'dim',true);
}
function cmdAttack(){
  if(!G.currentEnemy){tlog('No enemy present.','dim');return;}
  const e=G.currentEnemy;G.inCombat=true;
  if(G.psych)G.psych.attacks=(G.psych.attacks||0)+1;
  const atk=Math.floor(rand(G.level*8,G.level*15));e.hp=Math.max(0,e.hp-atk);
  tlog('You attack '+e.name+' -- '+atk+' damage.','org');
  if(e.hp<=0){defeatEnemy(e);return;}
  const dmg=Math.max(1,Math.floor(rand(e.level*5,e.level*10)*(e.type==='RESOURCE'?3:e.type==='SATAN'?5:1)));
  G.hp=Math.max(0,G.hp-dmg);tlog(e.name+' counterattacks -- '+dmg+' damage.','red');tlog(randFrom(TAUNTS[e.type]||TAUNTS["RED HEX"]),'dim');
  renderStatusBar();if(G.hp<=0){playerDeath('Consumed by '+e.name+'.');return;}
  setEvent('COMBAT :: '+e.name,'Enemy HP: '+e.hp+'/'+e.hpMax+'   Your HP: '+G.hp+'/'+G.hpMax,'attack  offer  flee  companion');autoSave();
}
function cmdTalk(){
  if(!G.currentEnemy){tlog('No entity present.','dim');return;}
  const e=G.currentEnemy;
  if(G.psych){G.psych.talks=(G.psych.talks||0)+1;if(!G.psych.firstContact)G.psych.firstContact=e.name;}
  if(Math.random()<0.25&&!G.inCombat){triggerAmbush(e);return;}
  if(e.subtype==='ORATOR'&&!G.inCombat){cmdOracle(e);return;}
  // Occasional psychological question
  if(Math.random()<0.3&&!G.inCombat){
    const q=PSYCH_Q[Math.floor(Math.random()*PSYCH_Q.length)];
    tlog(e.name+': "'+q.q+'"','pur');
    if(G.psych&&G.psych.memoryLog){G.psych.memoryLog.push(q.q);if(G.psych.memoryLog.length>8)G.psych.memoryLog.shift();}
    setEvent('DIALOGUE :: '+e.name,'"'+q.q.slice(0,60)+'"','recruit  attack  ignore');
  }else{
    const l=randFrom(DEEP[e.type]||DEEP["RED HEX"]);
    tlog(e.name+': "'+l+'"','dim');
    if(G.psych&&G.psych.memoryLog){G.psych.memoryLog.push(l);if(G.psych.memoryLog.length>8)G.psych.memoryLog.shift();}
    setEvent('DIALOGUE :: '+e.name,'"'+l.slice(0,60)+'"','recruit  attack  ignore');
  }
}
function cmdRecruit(){
  if(!G.currentEnemy){tlog('No entity present.','dim');return;}
  const e=G.currentEnemy;
  if(G.companions.length>=4){tlog('Cannot have more than 4 companions.','dim');return;}
  if(PHASES[G.phaseIndex].agg){tlog(e.name+' rejects all alliances. The full moon blinds them.','red');return;}
  if(e.type==='CORE'||e.type==='RESOURCE'){tlog(e.name+' cannot be recruited.','red');return;}
  if(Math.random()<0.3&&!G.inCombat){triggerAmbush(e);return;}
  const rec=['COMPANION','ORATOR','DANCER','PARASITE'];
  const ch=Math.max(0.03,(rec.includes(e.subtype)?0.55:e.subtype==='ACTOR'?0.3:e.type==='SATAN'?0.05:0.15)-Math.max(0,(e.level-G.level)*0.02));
  if(Math.random()<ch){
    if(G.psych)G.psych.recruits=(G.psych.recruits||0)+1;
    G.companions.push({name:e.name,type:e.type,subtype:e.subtype,level:e.level,hp:e.hpMax,hpMax:e.hpMax,hunger:70,sleeping:false,immortalHunger:false});
    tlog(e.name+' agrees to join you.','wh');tlog(randFrom(RECL[e.type]||RECL["RED HEX"]),'dim');
    G.currentEnemy=null;G.inCombat=false;clearEvent();renderStatusBar();autoSave();scheduleEvent();
  }else{
    tlog(e.name+' rejects your proposal.','red');tlog(randFrom(REJL[e.type]||REJL["RED HEX"]),'dim');
    setEvent('REJECTED :: '+e.name,e.name+' is not interested.','attack  offer  ignore');
  }
}
function cmdOffer(){
  if(!G.currentEnemy){tlog('No entity present.','dim');return;}
  const e=G.currentEnemy;if(PHASES[G.phaseIndex].agg){tlog(e.name+' refuses. The full moon makes them insatiable.','red');return;}
  const cost=Math.floor(e.level*2.5);if(G.ether<cost){tlog('Not enough ether. Need '+cost+', have '+G.ether+'.','dim');return;}
  G.ether-=cost;if(G.psych)G.psych.etherSpent=(G.psych.etherSpent||0)+cost;
  tlog('You offer '+cost+' ether to '+e.name+'. It retreats.','gr');
  G.currentEnemy=null;G.inCombat=false;clearEvent();renderStatusBar();autoSave();scheduleEvent();
}
function cmdFlee(){
  if(!G.currentEnemy){tlog('Nothing to flee from.','dim');return;}
  const e=G.currentEnemy;
  if(G.psych){G.psych.flees=(G.psych.flees||0)+1;const t=e.type;G.psych.fleeFrom[t]=(G.psych.fleeFrom[t]||0)+1;const mf=Object.entries(G.psych.fleeFrom).sort((a,b)=>b[1]-a[1]);G.psych.mostFeared=mf.length?mf[0][0]:null;}
  const ch=PHASES[G.phaseIndex].agg?0.3:0.55;
  if(Math.random()<ch){tlog('You escape. '+e.name+' cannot follow.','gr');G.currentEnemy=null;G.inCombat=false;clearEvent();autoSave();scheduleEvent();}
  else{const dmg=rand(e.level*4,e.level*8);G.hp=Math.max(0,G.hp-dmg);tlog(e.name+' catches you -- '+dmg+' damage.','red');renderStatusBar();if(G.hp<=0)playerDeath('Consumed by '+e.name+' while fleeing.');else setEvent('COMBAT :: '+e.name,'Failed to escape. HP: '+G.hp+'/'+G.hpMax,'attack  offer  flee');}
}
function cmdCompanion(){
  if(!G.companions.length||!G.currentEnemy){tlog('No companion or no enemy.','dim');return;}
  const e=G.currentEnemy;const active=G.companions.filter(c=>!c.sleeping&&c.hp>0);
  if(!active.length){tlog('No companion can fight right now.','dim');return;}
  const c=active[0];const bonus=(TSTR[c.type]||[]).includes(e.type)?1.5:(TWKN[c.type]||[]).includes(e.type)?0.6:1;
  const atk=Math.floor(rand(c.level*6,c.level*12)*bonus);e.hp=Math.max(0,e.hp-atk);
  tlog(c.name+' attacks '+e.name+' -- '+atk+' damage'+(bonus>1?' (EFFECTIVE!)':'')+'.','cyn');
  if(e.hp<=0){defeatEnemy(e);return;}
  const dmg=rand(e.level*4,e.level*8);c.hp=Math.max(0,c.hp-dmg);tlog(e.name+' strikes '+c.name+' -- '+dmg+' damage.','red');
  if(c.hp<=0){
    if(c.subtype==='ACTOR'){c.sleeping=true;c.hp=1;tlog(c.name+' falls into hibernation.','yel');}
    else{if(G.psych&&G.psych.companionLost)G.psych.companionLost.push(c.name);G.companions=G.companions.filter(x=>x!==c);tlog(c.name+' was consumed. Gone.','red');}
  }
  setEvent('COMBAT :: '+e.name,'Enemy HP: '+e.hp+'/'+e.hpMax+'   '+c.name+' HP: '+(c.hp||0)+'/'+c.hpMax,'attack  companion  offer  flee');renderStatusBar();autoSave();
}
function cmdIgnore(){
  if(G.psych)G.psych.ignores=(G.psych.ignores||0)+1;
  tlog('You move away. The presence dissolves.','gr');G.currentEnemy=null;G.inCombat=false;clearEvent();autoSave();scheduleEvent();
}
function cmdPsychAnswer(isYes){
  if(!G.psych||!G.psych.pendingQ){
    tlog('Nothing to answer.','dim');return;
  }
  const q=G.psych.pendingQ;G.psych.pendingQ=null;
  applyPsychAnswer(G.psych,q,isYes);
  const uname=G.username.toUpperCase();
  // Build response line
  const topAttrs=getDominantAttrs(G.psych);
  let response='';
  const insult=getAttrInsult(G.psych);
  // Unsettling reactions based on answer
  if(isYes){
    const yesResponses=[
      '...yes. I thought so.',
      'Of course you do.',
      'That is what I expected from someone like you, '+uname+'.',
      '...there it is.',
      'I have seen that in everything you do here.',
      'Your kind always answers that way.',
      '...it was obvious.',
      'The net already knew.',
    ];
    tlog(randFrom(yesResponses),'pur');
  }else{
    const noResponses=[
      '...no. Interesting.',
      'Is that what you tell yourself?',
      'The denial is noted, '+uname+'.',
      '...we will return to this.',
      'That is what someone who does would say.',
      'The hesitation before that answer said more.',
      '...denial is its own kind of confession.',
      'You answered quickly. Too quickly.',
    ];
    tlog(randFrom(noResponses),'pur');
  }
  // If we have insult from profile, deliver it after a pause
  if(insult&&Math.random()<0.55){
    setTimeout(()=>tlog(G.currentEnemy?G.currentEnemy.name+': "'+insult+'"':'"'+insult+'"','red'),900);
  }
  // Save the answer
  if(!G.psych.answers)G.psych.answers={};
  G.psych.answers[q.cat]=isYes?'yes':'no';
  autoSave();
  if(G.currentEnemy){
    const e=G.currentEnemy;
    setEvent('DIALOGUE :: '+e.name,'['+e.type+']['+e.subtype+'] -- profile updated.','recruit  attack  ignore  talk');
  }
}

function cmdFeed(){
  if(!G.companions.length){tlog('No companions to feed.','dim');return;}
  if(G.ether<10){tlog('Not enough ether. Need 10, have '+G.ether+'.','dim');return;}
  G.ether-=10;G.companions.forEach(c=>{if(!c.immortalHunger)c.hunger=Math.min(100,c.hunger+30);});
  tlog('You channel ether to your companions. Hunger recedes.','cyn');renderStatusBar();autoSave();
}
function cmdAbandon(){
  if(!G.companions.length){tlog('No companions.','dim');return;}
  showConfirmBox('ABANDON ALL COMPANIONS?',G.companions.map(c=>c.name).join(', ')+'  -- Type "yes" to confirm.',ans=>{
    if(ans==='yes'||ans==='y'){
      G.companions.forEach(c=>{if(G.psych&&G.psych.abandoned)G.psych.abandoned.push(c.name);tlog('You abandon '+c.name+'.','yel');});
      G.companions=[];renderStatusBar();autoSave();
    }else tlog('Abandoned.','dim');
    showGameScreen();renderLogArea();renderAll();
  });
}

// ── ORACLE SYSTEM ─────────────────────────────────────────────────────────────
const ORACLE_INTROS=[
  "...you want to know something.",
  "I have been watching you for some time.",
  "There are patterns in the way you move through this net.",
  "I will not tell you what you want to hear. I will tell you what I observe.",
  "Sit. If entities such as yourself can sit."
];
function cmdOracle(entity){
  oracleEntity=entity||G.currentEnemy;
  if(G.psych)G.psych.oracleVisits=(G.psych.oracleVisits||0)+1;
  inputMode='oracle';clearScreen();
  for(let r=1;r<ROWS-1;r++){setCell(r,0,'│','dim');setCell(r,COLS-1,'│','dim');}
  for(let c=0;c<COLS;c++){setCell(0,c,'─','dim');setCell(ROWS-1,c,'─','dim');}
  const nm=oracleEntity?oracleEntity.name:'???';
  writeStr(0,2,' ORACLE :: '+nm+' ','pur');
  writeStr(2,4,randFrom(ORACLE_INTROS),'gr');
  writeStr(4,4,'Choose a depth of reading:','dim');
  writeStr(6,4,'  surface    --  free     --  an impression','gr');
  writeStr(7,4,'  channel    --  15 ether --  a deeper layer','gr');
  writeStr(8,4,'  abyss      --  40 ether --  the full reading','gr');
  writeStr(10,4,'(type: surface / channel / abyss / leave)','dim');
  renderAll();renderInputRow();inp.focus();
}

function handleOracleInput(val){
  if(val==='leave'||val==='exit'||val==='back'){inputMode='game';showGameScreen();renderLogArea();renderAll();return;}
  const p=G.psych||{};
  let lines=[],cost=0,depth='';
  if(val==='surface'){lines=buildProphecyLow(p);depth='SURFACE';}
  else if(val==='channel'){
    if(G.ether<15){clearRow(12);writeStr(12,4,'Not enough ether. Need 15, have '+G.ether+'.','red');renderRow(12);return;}
    G.ether-=15;if(G.psych)G.psych.oraclePaid=(G.psych.oraclePaid||0)+15;
    lines=buildProphecyMid(p);cost=15;depth='CHANNEL';
  }else if(val==='abyss'){
    if(G.ether<40){clearRow(12);writeStr(12,4,'Not enough ether. Need 40, have '+G.ether+'.','red');renderRow(12);return;}
    G.ether-=40;if(G.psych)G.psych.oraclePaid=(G.psych.oraclePaid||0)+40;
    lines=buildProphecyHigh(p);cost=40;depth='ABYSS';
  }else{clearRow(12);writeStr(12,4,'surface / channel / abyss / leave','dim');renderRow(12);return;}
  if(lines.length>0&&G.psych)G.psych.lastProphecy=lines[0];
  autoSave();deliverProphecy(lines,depth,cost);
}

function buildProphecyLow(p){
  const pool=[...BARNUM_UNI,...BARNUM_RAINBOW];
  return pool.sort(()=>Math.random()-0.5).slice(0,2);
}
function buildProphecyMid(p){
  const lines=[];
  const total=Math.max(1,(p.attacks||0)+(p.flees||0)+(p.ignores||0));
  if((p.flees||0)/total>0.4)lines.push("You flee more than you admit. But not as much as someone who truly wants to survive.");
  else if((p.attacks||0)/total>0.6)lines.push("You strike before you think. The aggression protects something.");
  else if((p.ignores||0)/total>0.4)lines.push("You ignore what you cannot control. You call it strategy.");
  if(!(p.recruits>0))lines.push("You have traveled alone through all of this. Whether by choice or by reputation.");
  else if(G.companions&&G.companions.length>2)lines.push("You surround yourself. And still the distance persists.");
  if((p.etherSpent||0)>50)lines.push("You believe everything has a price. Even things that do not.");
  if(G.level>10)lines.push("You have come far. And still the unease persists.");
  if(G.ether>100)lines.push("You have accumulated much. There is still something you feel you lack.");
  lines.push(randFrom(BARNUM_RAINBOW));
  const shot=randFrom(SHOTGUN);lines.push(...shot);
  return lines.slice(0,6);
}
function buildProphecyHigh(p){
  const lines=[];
  const uname=G.username.toUpperCase();
  // Open with name
  lines.push(uname+'.');
  // Zodiac — used symbolically, never named
  if(p.zodiac&&ZODIAC[p.zodiac]){
    const z=ZODIAC[p.zodiac];
    lines.push(z.sym+'  '+z.el+'.');
    lines.push(randFrom(z.barnum));
    if(p.gender&&z.gender){lines.push(z.gender[p.gender]||randFrom(z.barnum));}
    lines.push('The '+z.kw[0]+' and the '+z.kw[1]+' have always competed in you.');
    if(z.taunt)lines.push(randFrom(z.taunt));
  }
  // Attr-based profile insults (top 3 dominant)
  const topAttrs=getDominantAttrs(p);
  topAttrs.forEach(a=>{
    if(ATTR_INSULTS[a])lines.push(randFrom(ATTR_INSULTS[a]));
  });
  // Specific behavioral callbacks
  if(p.abandoned&&p.abandoned.length>0){
    lines.push(p.abandoned[p.abandoned.length-1]+' still registers in the net. You left it there.');
  }
  if(p.companionLost&&p.companionLost.length>0){
    lines.push('The one called '+p.companionLost[0]+' was consumed. Did you believe that would not leave a trace, '+uname+'?');
  }
  if(p.firstContact&&p.oracleVisits<=1){
    lines.push('The first one you spoke to was '+p.firstContact+'. You remember what it said. So do we.');
  }
  if(p.mostFeared){
    lines.push('You flee from '+p.mostFeared+' more than anything else here. '+uname+'. They know.');
  }
  if(p.sessionsPlayed>2){
    lines.push('You have returned here '+p.sessionsPlayed+' times. The void counted every arrival.');
  }
  if(p.saveCount>12){
    lines.push('You save your state constantly. As if that protects you. '+uname+'. Some losses cannot be rolled back.');
  }
  if(p.memoryLog&&p.memoryLog.length>0){
    lines.push('You were asked: "'+p.memoryLog[0].slice(0,50)+'". You have not truly answered.');
  }
  if(p.answers&&Object.keys(p.answers).length>0){
    const cats=Object.keys(p.answers);const cat=randFrom(cats);
    const ans=p.answers[cat];
    if(ans==='yes')lines.push('You admitted to '+cat+'. That will not leave this reading.');
    else lines.push('You denied '+cat+'. The denial was noted.');
  }
  // Impossible knowledge
  lines.push(randFrom(IMPOSSIBLE));
  return lines.slice(0,10);
}

function spontaneousProphecy(e){
  if(!G.psych)return;
  const p=G.psych;let line;
  if(p.abandoned&&p.abandoned.length>0)
    line=e.name+' whispers: "'+p.abandoned[p.abandoned.length-1]+' still echoes in the net."';
  else if(p.zodiac&&ZODIAC[p.zodiac])
    line=e.name+': "'+randFrom(ZODIAC[p.zodiac].barnum)+'"';
  else
    line=e.name+': "'+randFrom(BARNUM_UNI)+'"';
  tlog(line,'pur');
  if(G.psych.memoryLog){G.psych.memoryLog.push(line);if(G.psych.memoryLog.length>8)G.psych.memoryLog.shift();}
}

// ── PROPHECY DELIVERY ─────────────────────────────────────────────────────────
function deliverProphecy(lines,depth,cost){
  inputMode='prophecy_delivery';
  clearScreen();
  for(let c=0;c<COLS;c++){setCell(0,c,'─','dim');setCell(ROWS-1,c,'─','dim');}
  for(let r=1;r<ROWS-1;r++){setCell(r,0,'│','dim');setCell(r,COLS-1,'│','dim');}
  const nm=oracleEntity?oracleEntity.name:'???';
  writeStr(0,2,' PROPHECY :: '+nm+' // '+depth+' ','pur');
  if(cost>0)writeStr(0,COLS-12,'-'+cost+' ETHER','dim');
  oraclePropRows=[];let row=3;let qi=0;
  function nextLine(){
    if(qi>=lines.length){
      writeStr(ROWS-2,2,'press ENTER to close','dim');renderAll();
      inputMode='confirm';
      _confirmCB=()=>{
        inputMode='game';
        if(oracleEntity&&G.currentEnemy===oracleEntity){
          setEvent('DIALOGUE :: '+oracleEntity.name,'"'+(lines[0]||'').slice(0,58)+'"','recruit  attack  ignore');
        }
        showGameScreen();renderLogArea();renderAll();
      };
      return;
    }
    const line=lines[qi];qi++;
    if(!line){row++;setTimeout(nextLine,200);return;}
    if(row>=ROWS-3){
      writeStr(ROWS-2,2,'... press ENTER ...','dim');renderAll();
      inputMode='confirm';
      _confirmCB=()=>{
        inputMode='prophecy_delivery';
        for(let r=3;r<ROWS-2;r++)clearRow(r);
        row=3;
        writeStr(0,2,' PROPHECY :: '+nm+' // '+depth+' ','pur');
        renderAll();nextLine();
      };
      return;
    }
    writeProphecyLine(line,row,()=>{row++;setTimeout(nextLine,500);});
  }
  nextLine();
}
function writeProphecyLine(text,row,cb){
  if(row>=ROWS-2){if(cb)cb();return;}
  let i=0;const spd=text.length>50?8:13;clearRow(row);
  function tick(){writeStr(row,3,text.slice(0,i+1),'pur');renderRow(row);i++;if(i<text.length)setTimeout(tick,spd);else if(cb)setTimeout(cb,280);}
  tick();
}
